<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Work Tracker</title>
  <style>
    :root {
      --bg-a: #f5f7fb;
      --bg-b: #dfe8f3;
      --glass: rgba(255, 255, 255, 0.58);
      --glass-strong: rgba(255, 255, 255, 0.78);
      --input: rgba(255, 255, 255, 0.72);
      --text: #101827;
      --muted: #657083;
      --line: rgba(135, 151, 174, 0.28);
      --primary: #007aff;
      --primary-strong: #0066d6;
      --green: #22a06b;
      --amber: #c47a12;
      --red: #e15a3d;
      --ink: #0f172a;
      --ring-track: rgba(120, 136, 160, 0.22);
      --shadow: 0 18px 55px rgba(35, 48, 68, 0.14);
      --radius: 18px;
      --blur: blur(24px) saturate(155%);
    }

    body[data-theme="dark"] {
      --bg-a: #070a10;
      --bg-b: #151b28;
      --glass: rgba(24, 30, 42, 0.58);
      --glass-strong: rgba(31, 38, 52, 0.72);
      --input: rgba(17, 23, 34, 0.62);
      --text: #f6f8fb;
      --muted: #a0a9b8;
      --line: rgba(185, 199, 220, 0.18);
      --primary: #0a84ff;
      --primary-strong: #3397ff;
      --green: #30d158;
      --amber: #ffd60a;
      --red: #ff6961;
      --ink: #f6f8fb;
      --ring-track: rgba(185, 199, 220, 0.18);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(0, 122, 255, 0.24), transparent 28rem),
        radial-gradient(circle at 85% 12%, rgba(48, 209, 88, 0.18), transparent 24rem),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      color: var(--text);
      transition: background 180ms ease, color 180ms ease;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0 36px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 14px;
      align-items: stretch;
      margin-bottom: 14px;
    }

    .hero-main,
    .panel {
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }

    .hero-main {
      padding: 16px;
      overflow: hidden;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .eyebrow,
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--glass-strong);
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .eyebrow {
      padding: 4px 11px;
    }

    .theme-toggle {
      gap: 7px;
      padding: 4px 11px;
    }

    .hero-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .hero-metric {
      min-height: 86px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--glass-strong);
    }

    .hero-metric strong {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .hero-metric span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .today-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
    }

    .field label,
    .mini-label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--input);
      color: var(--text);
    }

    .field input,
    .field select {
      height: 44px;
      padding: 0 12px;
    }

    .progress-ring {
      display: grid;
      place-items: center;
      width: 170px;
      height: 170px;
      margin: 2px auto;
      border-radius: 50%;
      background: conic-gradient(var(--green) 0deg, var(--green) 0deg, var(--ring-track) 0deg);
    }

    .progress-core {
      display: grid;
      place-items: center;
      width: 124px;
      height: 124px;
      border-radius: 50%;
      background: var(--glass-strong);
      text-align: center;
      border: 1px solid var(--line);
    }

    .progress-core strong {
      font-size: 38px;
      line-height: 1;
    }

    .progress-core span {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 14px;
      align-items: start;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .task-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 132px 112px;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    .task-form .notes-field {
      grid-column: 1 / -1;
    }

    .task-form textarea {
      min-height: 70px;
      padding: 10px 12px;
      resize: vertical;
    }

    .primary-btn,
    .secondary-btn,
    .quick-btn,
    .icon-btn {
      border-radius: 12px;
      font-weight: 900;
      transition: 160ms ease;
    }

    .primary-btn {
      min-height: 44px;
      border: 0;
      background: var(--primary);
      color: #fff;
      padding: 0 16px;
    }

    .primary-btn:hover {
      background: var(--primary-strong);
      transform: translateY(-1px);
    }

    .filters {
      display: flex;
      gap: 6px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(122, 139, 163, 0.16);
    }

    .filter-btn {
      min-height: 34px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0 10px;
      font-size: 14px;
      font-weight: 900;
    }

    .filter-btn.active {
      background: var(--glass-strong);
      color: var(--ink);
      box-shadow: 0 8px 22px rgba(21, 32, 51, 0.1);
    }

    .task-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .task-item {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .task-item:last-child {
      border-bottom: 0;
    }

    .task-item:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .task-item input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-top: 2px;
      accent-color: var(--green);
    }

    .task-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .task-title {
      margin: 0;
      font-weight: 900;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .done .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-notes {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 9px;
      background: rgba(122, 139, 163, 0.18);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .high {
      background: rgba(255, 105, 97, 0.18);
      color: var(--red);
    }

    .medium {
      background: rgba(255, 214, 10, 0.18);
      color: var(--amber);
    }

    .low {
      background: rgba(48, 209, 88, 0.18);
      color: var(--green);
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      background: var(--glass-strong);
      color: var(--red);
      font-size: 22px;
      line-height: 1;
    }

    .icon-btn:hover {
      border-color: rgba(255, 105, 97, 0.35);
      background: rgba(255, 105, 97, 0.1);
    }

    .empty-state {
      padding: 44px 20px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .side-stack {
      display: grid;
      gap: 14px;
    }

    .period-panel {
      padding: 16px;
    }

    .range-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .period-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .stat {
      min-height: 82px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--glass-strong);
    }

    .stat strong {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .bar-chart {
      display: grid;
      gap: 9px;
      margin-top: 16px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr) 48px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .bar-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(122, 139, 163, 0.18);
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: var(--primary);
    }

    .quick-actions {
      padding: 16px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .quick-btn,
    .secondary-btn {
      min-height: 40px;
      border: 1px solid var(--line);
      background: var(--glass-strong);
      color: var(--text);
      padding: 0 10px;
    }

    .quick-btn:hover,
    .secondary-btn:hover {
      background: rgba(255, 255, 255, 0.24);
    }

    .danger {
      color: var(--red);
    }

    .hint {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 940px) {
      .hero,
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 16px;
      }

      .hero-main,
      .today-card,
      .period-panel,
      .quick-actions {
        padding: 14px;
      }

      .task-form,
      .range-grid {
        grid-template-columns: 1fr;
      }

      .hero-strip {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .hero-metric {
        min-height: 86px;
        padding: 10px;
      }

      .hero-metric strong {
        font-size: 24px;
      }

      .hero-metric span {
        font-size: 11px;
      }

      .task-form .notes-field {
        order: 3;
      }

      .task-form .primary-btn {
        order: 4;
      }

      .panel-header {
        align-items: stretch;
        flex-direction: column;
      }

      .top-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .filters {
        width: 100%;
      }

      .filter-btn {
        flex: 1;
      }

      .period-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-main">
        <div class="top-row">
          <h1>Daily Tracker</h1>
          <div class="top-actions">
            <span class="eyebrow" id="dateLabel">Today</span>
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch theme">Dark</button>
          </div>
        </div>

        <div class="hero-strip" aria-label="Today summary">
          <div class="hero-metric">
            <strong id="heroDone">0</strong>
            <span>Completed today</span>
          </div>
          <div class="hero-metric">
            <strong id="heroPending">0</strong>
            <span>Pending today</span>
          </div>
          <div class="hero-metric">
            <strong id="heroPriority">0</strong>
            <span>High priority open</span>
          </div>
        </div>
      </div>

      <aside class="panel today-card" aria-label="Daily progress">
        <div class="field">
          <label for="workDate">Work date</label>
          <input id="workDate" type="date" />
        </div>
        <div class="progress-ring" id="progressRing">
          <div class="progress-core">
            <div>
              <strong id="progressNumber">0%</strong>
              <span>Complete</span>
            </div>
          </div>
        </div>
      </aside>
    </section>

    <section class="layout">
      <section class="panel" aria-labelledby="tasksTitle">
        <div class="panel-header">
          <h2 id="tasksTitle">Work Queue</h2>
          <div class="filters" aria-label="Task filter">
            <button class="filter-btn active" type="button" data-filter="all">All</button>
            <button class="filter-btn" type="button" data-filter="pending">Pending</button>
            <button class="filter-btn" type="button" data-filter="completed">Done</button>
          </div>
        </div>

        <form id="taskForm" class="task-form">
          <div class="field">
            <label for="taskInput">Task</label>
            <input id="taskInput" type="text" placeholder="Example: Finish client follow-up" autocomplete="off" required />
          </div>
          <div class="field">
            <label for="priorityInput">Priority</label>
            <select id="priorityInput">
              <option value="High">High</option>
              <option value="Medium" selected>Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>
          <button class="primary-btn" type="submit">Add Task</button>
          <div class="field notes-field">
            <label for="notesInput">Notes</label>
            <textarea id="notesInput" placeholder="Optional notes, blockers, links, or next action"></textarea>
          </div>
        </form>

        <ul id="taskList" class="task-list"></ul>
        <div id="emptyState" class="empty-state" hidden>No tasks in this view yet.</div>
      </section>

      <aside class="side-stack">
        <section class="panel period-panel" aria-labelledby="periodTitle">
          <div class="panel-header" style="padding: 0 0 14px; border-bottom: 0;">
            <h2 id="periodTitle">Period Report</h2>
          </div>

          <div class="range-grid">
            <div class="field">
              <label for="rangeStart">From</label>
              <input id="rangeStart" type="date" />
            </div>
            <div class="field">
              <label for="rangeEnd">To</label>
              <input id="rangeEnd" type="date" />
            </div>
          </div>

          <div class="period-stats">
            <div class="stat">
              <strong id="periodTotal">0</strong>
              <span>Total</span>
            </div>
            <div class="stat">
              <strong id="periodDone">0</strong>
              <span>Done</span>
            </div>
            <div class="stat">
              <strong id="periodPending">0</strong>
              <span>Pending</span>
            </div>
          </div>

          <div class="bar-chart" aria-label="Period completion chart">
            <div class="bar-row">
              <span>Completed</span>
              <div class="bar-track"><div id="doneBar" class="bar-fill"></div></div>
              <strong id="doneRate">0%</strong>
            </div>
            <div class="bar-row">
              <span>Pending</span>
              <div class="bar-track"><div id="pendingBar" class="bar-fill" style="background: var(--amber);"></div></div>
              <strong id="pendingRate">0%</strong>
            </div>
          </div>
        </section>

        <section class="panel quick-actions" aria-labelledby="actionsTitle">
          <h2 id="actionsTitle" style="margin: 0 0 14px; font-size: 18px;">Quick Actions</h2>
          <div class="quick-grid">
            <button id="clearCompletedBtn" class="quick-btn" type="button">Clear Done</button>
            <button id="clearDayBtn" class="quick-btn danger" type="button">Clear Day</button>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "dailyWorkTracker.v2";
    const OLD_STORAGE_KEY = "dailyWorkTracker.v1";
    const THEME_KEY = "dailyWorkTracker.theme";

    const el = {
      dateLabel: document.getElementById("dateLabel"),
      workDate: document.getElementById("workDate"),
      rangeStart: document.getElementById("rangeStart"),
      rangeEnd: document.getElementById("rangeEnd"),
      themeToggle: document.getElementById("themeToggle"),
      taskForm: document.getElementById("taskForm"),
      taskInput: document.getElementById("taskInput"),
      priorityInput: document.getElementById("priorityInput"),
      notesInput: document.getElementById("notesInput"),
      taskList: document.getElementById("taskList"),
      emptyState: document.getElementById("emptyState"),
      filterButtons: document.querySelectorAll(".filter-btn"),
      progressRing: document.getElementById("progressRing"),
      progressNumber: document.getElementById("progressNumber"),
      heroDone: document.getElementById("heroDone"),
      heroPending: document.getElementById("heroPending"),
      heroPriority: document.getElementById("heroPriority"),
      periodTotal: document.getElementById("periodTotal"),
      periodDone: document.getElementById("periodDone"),
      periodPending: document.getElementById("periodPending"),
      doneBar: document.getElementById("doneBar"),
      pendingBar: document.getElementById("pendingBar"),
      doneRate: document.getElementById("doneRate"),
      pendingRate: document.getElementById("pendingRate"),
      clearCompletedBtn: document.getElementById("clearCompletedBtn"),
      clearDayBtn: document.getElementById("clearDayBtn")
    };

    let state = loadState();
    let activeFilter = "all";
    let theme = localStorage.getItem(THEME_KEY) || "light";

    function applyTheme() {
      document.body.dataset.theme = theme;
      el.themeToggle.textContent = theme === "dark" ? "Day" : "Dark";
      el.themeToggle.setAttribute("aria-label", `Switch to ${theme === "dark" ? "day" : "dark"} mode`);
      renderTodaySummary(tasksFor(selectedDate()));
    }

    function toggleTheme() {
      theme = theme === "dark" ? "light" : "dark";
      localStorage.setItem(THEME_KEY, theme);
      applyTheme();
    }

    function todayKey() {
      const now = new Date();
      const localDate = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return localDate.toISOString().slice(0, 10);
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(OLD_STORAGE_KEY);
      try {
        return JSON.parse(saved) || { days: {} };
      } catch {
        return { days: {} };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function selectedDate() {
      return el.workDate.value;
    }

    function tasksFor(date) {
      if (!state.days[date]) state.days[date] = [];
      return state.days[date];
    }

    function createTask(title, priority, notes) {
      return {
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        title,
        priority,
        notes,
        completed: false,
        createdAt: new Date().toISOString()
      };
    }

    function addTask(event) {
      event.preventDefault();
      const title = el.taskInput.value.trim();
      if (!title) return;

      tasksFor(selectedDate()).push(createTask(title, el.priorityInput.value, el.notesInput.value.trim()));
      saveState();
      el.taskForm.reset();
      el.priorityInput.value = "Medium";
      el.taskInput.focus();
      render();
    }

    function toggleTask(id) {
      const task = tasksFor(selectedDate()).find((item) => item.id === id);
      if (!task) return;
      task.completed = !task.completed;
      task.completedAt = task.completed ? new Date().toISOString() : "";
      saveState();
      render();
    }

    function deleteTask(id) {
      const date = selectedDate();
      state.days[date] = tasksFor(date).filter((item) => item.id !== id);
      saveState();
      render();
    }

    function setFilter(filter) {
      activeFilter = filter;
      el.filterButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.filter === filter);
      });
      render();
    }

    function clearCompleted() {
      const date = selectedDate();
      state.days[date] = tasksFor(date).filter((task) => !task.completed);
      saveState();
      render();
    }

    function clearDay() {
      if (!confirm("Clear every task for this date?")) return;
      state.days[selectedDate()] = [];
      saveState();
      render();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function visibleTasks(tasks) {
      if (activeFilter === "completed") return tasks.filter((task) => task.completed);
      if (activeFilter === "pending") return tasks.filter((task) => !task.completed);
      return tasks;
    }

    function priorityClass(priority) {
      return String(priority || "Medium").toLowerCase();
    }

    function renderTasks(tasks) {
      const list = visibleTasks(tasks);
      el.taskList.innerHTML = "";

      list.forEach((task) => {
        const item = document.createElement("li");
        item.className = `task-item${task.completed ? " done" : ""}`;
        item.innerHTML = `
          <input type="checkbox" ${task.completed ? "checked" : ""} aria-label="Toggle ${escapeHtml(task.title)}" />
          <div>
            <div class="task-title-row">
              <p class="task-title">${escapeHtml(task.title)}</p>
            </div>
            ${task.notes ? `<p class="task-notes">${escapeHtml(task.notes)}</p>` : ""}
            <div class="meta-row">
              <span class="badge ${priorityClass(task.priority)}">${escapeHtml(task.priority || "Medium")}</span>
              <span class="badge">${task.completed ? "Completed" : "Pending"}</span>
            </div>
          </div>
          <button class="icon-btn" type="button" aria-label="Delete ${escapeHtml(task.title)}">&times;</button>
        `;

        item.querySelector("input").addEventListener("change", () => toggleTask(task.id));
        item.querySelector("button").addEventListener("click", () => deleteTask(task.id));
        el.taskList.appendChild(item);
      });

      el.emptyState.hidden = list.length > 0;
    }

    function renderTodaySummary(tasks) {
      const total = tasks.length;
      const done = tasks.filter((task) => task.completed).length;
      const pending = total - done;
      const highOpen = tasks.filter((task) => !task.completed && task.priority === "High").length;
      const percent = total ? Math.round((done / total) * 100) : 0;
      const degrees = Math.round((percent / 100) * 360);

      el.heroDone.textContent = done;
      el.heroPending.textContent = pending;
      el.heroPriority.textContent = highOpen;
      el.progressNumber.textContent = `${percent}%`;
      el.progressRing.style.background = `conic-gradient(var(--green) ${degrees}deg, var(--ring-track) ${degrees}deg)`;
      el.dateLabel.textContent = selectedDate() === todayKey() ? "Today" : formatDate(selectedDate());
    }

    function formatDate(dateKey) {
      return new Date(`${dateKey}T00:00:00`).toLocaleDateString(undefined, {
        weekday: "short",
        month: "short",
        day: "numeric"
      });
    }

    function datesInRange(start, end) {
      const dates = [];
      const [startYear, startMonth, startDay] = start.split("-").map(Number);
      const [endYear, endMonth, endDay] = end.split("-").map(Number);
      const cursor = new Date(startYear, startMonth - 1, startDay);
      const finish = new Date(endYear, endMonth - 1, endDay);
      while (cursor <= finish) {
        const year = cursor.getFullYear();
        const month = String(cursor.getMonth() + 1).padStart(2, "0");
        const day = String(cursor.getDate()).padStart(2, "0");
        dates.push(`${year}-${month}-${day}`);
        cursor.setDate(cursor.getDate() + 1);
      }
      return dates;
    }

    function renderPeriodReport() {
      let start = el.rangeStart.value;
      let end = el.rangeEnd.value;
      if (start > end) {
        [start, end] = [end, start];
      }

      const tasks = datesInRange(start, end).flatMap((date) => state.days[date] || []);
      const total = tasks.length;
      const done = tasks.filter((task) => task.completed).length;
      const pending = total - done;
      const donePercent = total ? Math.round((done / total) * 100) : 0;
      const pendingPercent = total ? 100 - donePercent : 0;

      el.periodTotal.textContent = total;
      el.periodDone.textContent = done;
      el.periodPending.textContent = pending;
      el.doneBar.style.width = `${donePercent}%`;
      el.pendingBar.style.width = `${pendingPercent}%`;
      el.doneRate.textContent = `${donePercent}%`;
      el.pendingRate.textContent = `${pendingPercent}%`;
    }

    function render() {
      const tasks = tasksFor(selectedDate());
      renderTasks(tasks);
      renderTodaySummary(tasks);
      renderPeriodReport();
    }

    const today = todayKey();
    el.workDate.value = today;
    el.rangeStart.value = today;
    el.rangeEnd.value = today;
    applyTheme();

    el.taskForm.addEventListener("submit", addTask);
    el.themeToggle.addEventListener("click", toggleTheme);
    el.workDate.addEventListener("change", render);
    el.rangeStart.addEventListener("change", renderPeriodReport);
    el.rangeEnd.addEventListener("change", renderPeriodReport);
    el.clearCompletedBtn.addEventListener("click", clearCompleted);
    el.clearDayBtn.addEventListener("click", clearDay);
    el.filterButtons.forEach((button) => {
      button.addEventListener("click", () => setFilter(button.dataset.filter));
    });

    render();
  </script>
</body>
</html>
